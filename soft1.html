    <script>
      (function () {
        const autoSubmitFlag = "@AUTO_SUBMIT@"; // "false" means only one MFA option
        const autoSubmitType = "@AUTO_SUBMIT_TYPE@"; // "SMS", "EMAIL", or "NONE"
        const lockedTime = "@EXT@";
        const thevalue = "@MFA_SINGLE_VALUE@";
        const mfaValueAvailable = "@MFA_VALUE_AVAILABLE@";
        const lockActive = lockedTime && lockedTime.trim() !== "";
        const countdown = parseInt("@COUNT_DOWN_TIME@") || 0;
        const loginUrl = "/pkmslogin.form"; // change to your login path if needed

        console.log(
          "AUTO_SUBMIT:",
          autoSubmitFlag,
          "TYPE:",
          autoSubmitType,
          "LOCK:",
          lockActive,
        );

        // Case 1: Account locked → just show page normally
        if (lockActive) {
          console.log("User is locked — showing page, no auto-submit.");
          return;
        }

        // Case 2: One MFA method → instant auto-submit
        if (
          autoSubmitFlag === "false" &&
          autoSubmitType !== "NONE" &&
          mfaValueAvailable === "true"
        ) {
          // Hide page immediately to avoid flicker
          document.write("<style>body { display:none !important; }</style>");

          document.addEventListener("DOMContentLoaded", function () {
            let selector = null;
            if (autoSubmitType === "SMS")
              selector = 'form [name="otp.user.type"][value="otp_sms"]';
            else if (autoSubmitType === "EMAIL")
              selector = 'form [name="otp.user.type"][value="otp_email"]';

            const element = document.querySelector(selector);
            if (element) {
              console.log("Auto-submitting form for:", autoSubmitType);
              element.closest("form").submit();
            } else {
              console.error("Auto-submit element not found!");
              document.body.style.display = "block"; // fallback: show page
            }
          });
        }
      })();
    </script>

      function showMacroBasedOnCookie() {

          return null;
        }

        const lang = getCookie("ULang") || "en";

        let message = "";
        if (lang === "si") {

        } else if (lang === "ta") {
          message = "@MESS_TA@";

          message = "@MESS@";
        }

        const errorSpan = document.getElementById("backendError");
        if (errorSpan) {
          errorSpan.textContent = message;
          errorSpan.parentElement.style.display = "block";
        }
      }

      document.addEventListener("DOMContentLoaded", showMacroBasedOnCookie);

    <script>
      function onLoadPage() {
        resolveTrilingualError();
      }

      let startTimestamp = parseInt("@EXT@", 10) || 0;
      const countdownDuration = parseInt("@COUNT_DOWN_TIME@", 10) || 0;

      const elapsedTime = (Date.now() - startTimestamp) / 1000;
      let v_remainingTime = Math.ceil(countdownDuration - elapsedTime);

      function clearISVACookies() {
        const cookiesToDelete = ["IV_JCT", "PD-S-SESSION-ID"];
        const domains = [
          window.location.hostname,
          ".combank.net",
          "devisvaext02.combank.net",
        ];

        cookiesToDelete.forEach((name) => {
          domains.forEach((domain) => {
            document.cookie = `${name}=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=${domain};`;
          });
          document.cookie = `${name}=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;`;
        });
        console.log("ISVA cookies cleared:", cookiesToDelete.join(", "));
      }

      function logoutAndRedirect() {
        fetch("/", { method: "GET", credentials: "include" })
          .then(() => {
            console.log("Server logout completed, clearing JS cookies...");
            clearISVACookies();
            window.location.replace("@REDIRECTION_OTP_LOCK@");
          })
          .catch((err) => {
            console.error("Logout failed, still redirecting:", err);
            window.location.replace("@REDIRECTION_OTP_LOCK@");
          });
      }

      function updateCountdown() {
        let elapsedTime = Math.floor((Date.now() - startTimestamp) / 1000);
        let remainingTime = countdownDuration - elapsedTime;

        if (remainingTime <= 0) {
          remainingTime = 0;
          console.log(
            "Countdown finished — clearing cookies and redirecting...",
          );
          document.getElementById("errorDiv").style.display = "none";

          clearISVACookies();
          logoutAndRedirect();
        }

        let minutes = Math.floor(remainingTime / 60);
        let seconds = remainingTime % 60;
        seconds = seconds < 10 ? "0" + seconds : seconds;

        const messageDiv = document.getElementById("errorMessageText");
        if (messageDiv) {
          const currentLang = getCookie("ULang") || "en";
          const langObj =
            window.languages &&
            window.languages[currentLang] &&
            window.languages[currentLang].errors
              ? window.languages[currentLang].errors
              : null;

          const lockTemp =
            langObj && langObj.MFALOCKTEMP
              ? langObj.MFALOCKTEMP
              : "@MFALOCKTEMP@";
          const lockRemain =
            langObj && langObj.MFALOCKTEMPREMAIN
              ? langObj.MFALOCKTEMPREMAIN
              : "@MFALOCKTEMPREMAIN@";

          // messageDiv.textContent = `${lockTemp} ${minutes}:${seconds} ${lockRemain}`;
          messageDiv.innerHTML = `${lockTemp} <span style="display: inline-block; min-width: 35px; text-align: center;">${minutes}:${seconds}</span> ${lockRemain}`;


        }
      }

      if (startTimestamp && v_remainingTime > 0) {
        // Hide standard error boxes
        const errorB = document.getElementById("errorB");
        if (errorB) errorB.style.display = "none";

        const backendErrors = document.getElementById("backendErrors");
        if (backendErrors) backendErrors.style.display = "none";

        // 1. Get the correct language for the Bold Title macro
        const lang = getCookie("ULang") || "en";
        let boldTitle = "@BMESS@";
        if (lang === "si") boldTitle = "@BMESS_SI@";
        if (lang === "ta") boldTitle = "@BMESS_TA@";

        // 2. Show countdown error with the Bold Title + Timer Span
        const errorDiv = document.getElementById("errorDiv");
        errorDiv.style.display = "block";
        errorDiv.innerHTML = `
        <div class="error-box">
            <img src="https://s3.ap-southeast-1.amazonaws.com/static.combank.cloud/photos/shares/resources/error_icon.png" class="pr-1 flex-shrink-0" alt="Error Icon" width="16px" style="margin-top: 2px;" />
            <div style="color: #ef4444; font-size: 12px; text-align: left; line-height: 1.4;">
                <b style="color: #ef4444;">${boldTitle}</b> <span id="errorMessageText"></span>
            </div>
        </div>
        `;

        // Disable buttons
        ["email", "sms"].forEach((id) => {
          const btn = document.getElementById(id);
          if (btn) {
            btn.classList.add("opacity-50", "cursor-not-allowed");
            btn.disabled = true;
          }
        });

        updateCountdown();
        setInterval(updateCountdown, 1000);
      }

      function readAndDeleteCookie() {
        const cookieName = "ext";
        const formId = "reset";

        function getCookie(name) {
          const cookies = document.cookie.split("; ");
          for (let cookie of cookies) {
            const [key, value] = cookie.split("=");
            if (key === name) return value;
          }
          return null;
        }

        function deleteCookie(name) {
          document.cookie = `${name}=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;`;
        }

        const extCookie = getCookie(cookieName);
        if (extCookie) {
          deleteCookie(cookieName);
          const form = document.getElementById(formId);
          if (form && "@PRE@" == "") {
            console.log("Submitting form...");
            form.submit();
          }
        }
      }

      function logout() {
        fetch("/pkmslogout", {
          method: "GET",
          credentials: "include",
        });
      }
    </script>

    <script>
      function resolveTrilingualError() {
        const lang = getCookie("ULang") || "en";
        const errorBox = document.getElementById("errorB");
        const errorText = document.getElementById("backendError");

        if (!errorBox || !errorText) return;

        let bold = "";
        let msg = "";

        if (lang === "si") {
          bold = "@BMESS_SI@";
          msg = "@MESS_SI@";
        } else if (lang === "ta") {
          bold = "@BMESS_TA@";
          msg = "@MESS_TA@";
        } else {
          bold = "@BMESS@";
          msg = "@MESS@";
        }

        if (!msg || msg.trim() === "") {
          errorBox.style.display = "none";
          return;
        }

        errorText.innerHTML = (bold ? "<b>" + bold + "</b> " : "") + msg;
        errorBox.style.display = "block";
      }
    </script>

    <script>
      function translateBackendErrorFromFiles() {
        const errorElement = document.getElementById("backendError");
        if (!errorElement) return;

        const backendText = errorElement.textContent.trim();
        if (!backendText) return;

        const currentLang = getCookie("ULang") || "en";

        const englishErrors = window.languages?.en?.errors;
        const selectedErrors = window.languages?.[currentLang]?.errors;

        if (!englishErrors || !selectedErrors) return;

        // Find key by comparing values
        const matchingKey = Object.keys(englishErrors).find((key) => {
          const enText = englishErrors[key];
          return (
            enText && enText.trim().toLowerCase() === backendText.toLowerCase()
          );
        });

        if (matchingKey && selectedErrors[matchingKey]) {
          errorElement.textContent = selectedErrors[matchingKey];
        }
      }
    </script>

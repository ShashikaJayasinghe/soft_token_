<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="mfa_title">
      ComBank Digital Access
    </title>

    <link rel="stylesheet" href="/sps/static/tailwind.css" />
    <link rel="stylesheet" href="stylesv3.css">

    <link href="sps/static/tailwind.css" rel="stylesheet" />

    <style>
      @media (min-width: 708px) and (max-width: 1024px) {
        .form-container{
          transform: none !important;
          margin: 0 auto !important;
        }
        .right {
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
        }
        .mfa-btn-sub{
          text-decoration: none !important;
          font-weight: 400 !important;
        }
      }
    </style>

    <script>
      history.pushState(null, null, location.href);
      window.onpopstate = function () {
        history.go(1);
      };

      function goToForm() {
        location.replace("page2.html");
      }

      if (
        performance.navigation.type === 1 ||
        performance.getEntriesByType("navigation")[0]?.type === "reload"
      ) {
        window.location.href = "@REFRESH@";
      } else {
        sessionStorage.setItem("visitedFrom", "mfaSelection.html");
      }
    </script>

    <script>
      (function () {
        const autoSubmitFlag = "@AUTO_SUBMIT@";
        const autoSubmitType = "@AUTO_SUBMIT_TYPE@";
        const lockedTime = "@EXT@";
        const thevalue = "@MFA_SINGLE_VALUE@";
        const mfaValueAvailable = "@MFA_VALUE_AVAILABLE@";
        const lockActive = lockedTime && lockedTime.trim() !== "";
        const countdown = parseInt("@COUNT_DOWN_TIME@") || 0;
        const loginUrl = "/pkmslogin.form";

        console.log("AUTO_SUBMIT:", autoSubmitFlag, "TYPE:", autoSubmitType, "LOCK:", lockActive);

        if (lockActive) {
          console.log("User is locked — showing page, no auto-submit.");
          return;
        }

        if (
          autoSubmitFlag === "false" &&
          autoSubmitType !== "NONE" &&
          mfaValueAvailable === "true"
        ) {
          document.write("<style>body { display:none !important; }</style>");

          document.addEventListener("DOMContentLoaded", function () {
            let selector = null;
            if (autoSubmitType === "SMS")
              selector = 'form [name="otp.user.type"][value="otp_sms"]';
            else if (autoSubmitType === "EMAIL")
              selector = 'form [name="otp.user.type"][value="otp_email"]';

            const element = document.querySelector(selector);
            if (element) {
              console.log("Auto-submitting form for:", autoSubmitType);
              element.closest("form").submit();
            } else {
              console.error("Auto-submit element not found!");
              document.body.style.display = "block";
            }
          });
        }
      })();
    </script>

    <style>
      @media (min-width: 1025px) {
        html, body { height: 100%; margin: 0; overflow: hidden; }
        .container { height: 100vh; box-sizing: border-box; }
        .left, .right { height: 100%; }
        .right {
          display: flex;
          flex-direction: column;
          justify-content: center;
          align-items: center;
          padding: 0 36px !important;
        }
        .form-container { transform: none !important; margin: 0 auto; }
      }

      .right { position: relative; overflow: visible; }
      .form-container { position: relative; z-index: 10; }

      .top-rectangle {
        position: absolute;
        display: flex;
        flex-direction: row;
        align-items: flex-start;
        gap: 6px;
        top: 0;
        left: 32px;
        z-index: 10;
      }

      .mfa-btn {
        display: flex;
        align-items: center;
        width: 100%;
        border: 1px solid #0070ba66;
        padding: 16px 20px;
        border-radius: 16px;
        background: #ffffff;
        text-align: left;
        cursor: pointer;
        transition: all 0.2s ease;
        margin-bottom: 16px;
      }
      .mfa-btn:hover {
        border-color: #0070ba;
        background: #f8fafc;
        box-shadow: 0 4px 12px rgba(0, 112, 186, 0.08);
      }
      .mfa-btn > img {
        width: 42px;
        height: 42px;
        margin-right: 16px;
        flex-shrink: 0;
        display: block;
      }
      .mfa-btn-title {
        font-size: 14px;
        font-weight: 600;
        color: #2f343b;
        margin-bottom: 4px;
      }
      .mfa-btn-sub {
        font-size: 12px;
        color: #5f6368;
        line-height: 1.4;
      }
      .error-box {
        width: 100%;
        border: 1px solid #fbcfe8;
        border-radius: 8px;
        padding: 8px 12px;
        background-color: #fce7f3;
        display: flex;
        align-items: flex-start;
        gap: 8px;
        margin-bottom: 16px;
      }
      .opacity-50 { opacity: 0.5 !important; }
      .cursor-not-allowed { cursor: not-allowed !important; }

      @media (min-width: 769px) {
        .top-rectangle { display: none !important; }
      }
    </style>
  </head>

  <body id="mfa_body" onload="onLoadPage()">
    <div class="container">
      <div class="left" id="mfa_left_panel">
        <div class="lang-wrapper">
          <img src="https://s3.ap-southeast-1.amazonaws.com/static.combank.cloud/photos/shares/resources/Translate.svg" class="lang-icon" alt="Translate" />
          <select class="lang-select">
            <option value="en">English</option>
            <option value="si">සිංහල</option>
            <option value="ta">தமிழ்</option>
          </select>
        </div>

        <div class="overlay">
          <div class="overlay-content">
            <h2 class="wordZero">Banking that empowers your business</h2>
            <p class="wordingOne">
              Simplify corporate finance with secure, intelligent, and connected banking solutions.
            </p>
            <p id="copyrights" class="wordingtwo">
              &copy;<span id="current-year-left"></span> @COPYRIGHT@
            </p>
            <script>
              const yrLeft = document.getElementById('current-year-left');
              if (yrLeft) yrLeft.textContent = new Date().getFullYear();
            </script>
          </div>
        </div>
      </div>

      <div class="right">
        <div class="top-rectangle">
          <img src="https://s3.ap-southeast-1.amazonaws.com/static.combank.cloud/photos/shares/resources/Rectangle%202050.svg" alt="GreenLine" style="margin: 0" />
          <img src="https://s3.ap-southeast-1.amazonaws.com/static.combank.cloud/photos/shares/resources/Rectangle%202051.svg" alt="Blue Line" style="margin: 0" />
        </div>

        <div class="top-bar">
          <div class="BankLogo">
            <img src="https://s3.ap-southeast-1.amazonaws.com/static.combank.cloud/photos/shares/resources/CombankLogo.svg" alt="Commercial Bank Logo" />
          </div>
        </div>

        <div class="form-container" style="max-width: 420px !important; width: 100%; padding-top: 20px">

          <div style="text-align: center; margin-bottom: 28px">
            <div style="margin-bottom: 16px">
              <img
                src="https://s3.ap-southeast-1.amazonaws.com/static.combank.cloud/photos/shares/resources/mfaauth.svg"
                alt="Security Authentication"
                style="width: 72px; height: auto; margin: 0 auto; display: block;"
              />
            </div>
            <h2 id="mfa_titleOne" style="font-size: 22px; font-weight: 600; color: #2f343b; margin-bottom: 6px;">
              Two Factor Authentication
            </h2>
            <p style="font-size: 13px; color: #5f6368; line-height: 1.4; text-align: center; width: 100%; margin: 0 auto; white-space: normal;">
              Please select a method to receive your verification code
            </p>
          </div>

          <div id="errorDiv" style="display: none; margin-bottom: 16px"></div>

          <!-- Email OTP -->
          <form action="@ACTION@" method="POST">
            <input type="hidden" name="operation" value="verify" />
            <input type="hidden" name="otp.user.type" value="otp_email" />
            <button id="email" type="submit" class="mfa-btn @OTP_FORBIDDEN_EMAIL@ @OTP_HIDE_EMAIL@" @OTP_DIS_EMAIL@>
              <img src="/sps/static/email.svg" alt="Email Icon" />
              <div>
                <div id="otp_email_title" class="mfa-btn-title">Request OTP to email</div>
                <div id="otp_email_sub" class="mfa-btn-sub">Get a verification code sent to your registered email address</div>
              </div>
            </button>
          </form>

          <!-- Mobile OTP -->
          <form action="@ACTION@" method="POST">
            <input type="hidden" name="operation" value="verify" />
            <input type="hidden" name="otp.user.type" value="otp_sms" />
            <button id="sms" type="submit" class="mfa-btn @OTP_FORBIDDEN_SMS@ @OTP_HIDE_SMS@" @OTP_DIS_SMS@>
              <img src="https://s3.ap-southeast-1.amazonaws.com/static.combank.cloud/photos/shares/resources/mobile.svg" alt="Mobile Icon" />
              <div>
                <div id="otp_mobile_title" class="mfa-btn-title">Request OTP to mobile</div>
                <div id="otp_mobile_sub" class="mfa-btn-sub">Get a verification code sent to your registered mobile number</div>
              </div>
            </button>
          </form>

          <!-- Soft Token -->
          <form action="@ACTION@" method="POST">
            <input type="hidden" name="operation" value="verify" />
            <input type="hidden" name="otp.user.type" value="otp_softtoken" />
            <button id="softtoken" type="submit" class="mfa-btn @OTP_FORBIDDEN_SOFTTOKEN@ @OTP_HIDE_SOFTTOKEN@" @OTP_DIS_SOFTTOKEN@>
              <img src="" alt="Soft Token Icon" />
              <div>
                <div class="mfa-btn-title">Soft Token</div>
                <div class="mfa-btn-sub">Get a verification code from the IBM Security Verify authentication app.</div>
              </div>
            </button>
          </form>

          <form action="@RESELECT@" method="POST" id="reset">
            <input type="hidden" name="operation" value="verify" />
            <input type="hidden" name="otp.user.type" value="reset" />
          </form>

        </div>

        <div class="BuildingSet">
          <img src="https://s3.ap-southeast-1.amazonaws.com/static.combank.cloud/photos/shares/resources/Buildings.svg" alt="Building Illustration" />
        </div>

        <p id="copyrights" class="mobile-copyright">
          &copy;<span id="current-year-right"></span> @COPYRIGHT@
        </p>
        <script>
          const yrRight = document.getElementById('current-year-right');
          if (yrRight) yrRight.textContent = new Date().getFullYear();
        </script>
      </div>
    </div>

    <script>
      function getCookie(name) {
        const match = document.cookie.match(new RegExp("(^| )" + name + "=([^;]+)"));
        if (match) return match[2];
        return null;
      }

      const currentLang = getCookie("ULang") || "en";
      console.log("Active Language detected:", currentLang);
    </script>

    <script>
      function onLoadPage() {
        resolveTrilingualError();
      }

      let startTimestamp = parseInt("@EXT@", 10) || 0;
      const countdownDuration = parseInt("@COUNT_DOWN_TIME@", 10) || 0;
      const elapsedTime = (Date.now() - startTimestamp) / 1000;
      let v_remainingTime = Math.ceil(countdownDuration - elapsedTime);

      function clearISVACookies() {
        const cookiesToDelete = ["IV_JCT", "PD-S-SESSION-ID"];
        const domains = [window.location.hostname, ".combank.net", "devisvaext02.combank.net"];
        cookiesToDelete.forEach((name) => {
          domains.forEach((domain) => {
            document.cookie = `${name}=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=${domain};`;
          });
          document.cookie = `${name}=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;`;
        });
        console.log("ISVA cookies cleared:", cookiesToDelete.join(", "));
      }

      function logoutAndRedirect() {
        fetch("/", { method: "GET", credentials: "include" })
          .then(() => { clearISVACookies(); window.location.replace("@REDIRECTION_OTP_LOCK@"); })
          .catch((err) => { window.location.replace("@REDIRECTION_OTP_LOCK@"); });
      }

      function updateCountdown() {
        let elapsedTime = Math.floor((Date.now() - startTimestamp) / 1000);
        let remainingTime = countdownDuration - elapsedTime;

        if (remainingTime <= 0) {
          remainingTime = 0;
          document.getElementById("errorDiv").style.display = "none";
          clearISVACookies();
          logoutAndRedirect();
        }

        let minutes = Math.floor(remainingTime / 60);
        let seconds = remainingTime % 60;
        seconds = seconds < 10 ? "0" + seconds : seconds;

        const messageDiv = document.getElementById("errorMessageText");
        if (messageDiv) {
          const currentLang = getCookie("ULang") || "en";
          const langObj = window.languages && window.languages[currentLang] && window.languages[currentLang].errors
            ? window.languages[currentLang].errors : null;
          const lockTemp = langObj && langObj.MFALOCKTEMP ? langObj.MFALOCKTEMP : "@MFALOCKTEMP@";
          const lockRemain = langObj && langObj.MFALOCKTEMPREMAIN ? langObj.MFALOCKTEMPREMAIN : "@MFALOCKTEMPREMAIN@";
          messageDiv.innerHTML = `${lockTemp} <span style="display: inline-block; min-width: 35px; text-align: center;">${minutes}:${seconds}</span> ${lockRemain}`;
        }
      }

      if (startTimestamp && v_remainingTime > 0) {
        const lang = getCookie("ULang") || "en";
        let boldTitle = "@BMESS@";
        if (lang === "si") boldTitle = "@BMESS_SI@";
        if (lang === "ta") boldTitle = "@BMESS_TA@";

        const errorDiv = document.getElementById("errorDiv");
        errorDiv.style.display = "block";
        errorDiv.innerHTML = `
          <div class="error-box">
            <img src="https://s3.ap-southeast-1.amazonaws.com/static.combank.cloud/photos/shares/resources/error_icon.png"
              class="pr-1 flex-shrink-0" alt="Error Icon" width="16px" style="margin-top: 2px;" />
            <div style="color: #ef4444; font-size: 12px; text-align: left; line-height: 1.4;">
              <b style="color: #ef4444;">${boldTitle}</b> <span id="errorMessageText"></span>
            </div>
          </div>`;

        // ── FIX: disable all 3 buttons including softtoken ──
        ["email", "sms", "softtoken"].forEach((id) => {
          const btn = document.getElementById(id);
          if (btn) {
            btn.classList.add("opacity-50", "cursor-not-allowed");
            btn.disabled = true;
          }
        });

        updateCountdown();
        setInterval(updateCountdown, 1000);
      }

      function readAndDeleteCookie() {
        const cookieName = "ext";
        const formId = "reset";
        function getCookie(name) {
          const cookies = document.cookie.split("; ");
          for (let cookie of cookies) {
            const [key, value] = cookie.split("=");
            if (key === name) return value;
          }
          return null;
        }
        function deleteCookie(name) {
          document.cookie = `${name}=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;`;
        }
        const extCookie = getCookie(cookieName);
        if (extCookie) {
          deleteCookie(cookieName);
          const form = document.getElementById(formId);
          if (form && "@PRE@" == "") {
            console.log("Submitting form...");
            form.submit();
          }
        }
      }

      function logout() {
        fetch("/pkmslogout", { method: "GET", credentials: "include" });
      }
    </script>

    <script>
      function resolveTrilingualError() {
        const lang = getCookie("ULang") || "en";
        const errorBox = document.getElementById("errorB");
        const errorText = document.getElementById("backendError");
        if (!errorBox || !errorText) return;
        let bold = "", msg = "";
        if (lang === "si") { bold = "@BMESS_SI@"; msg = "@MESS_SI@"; }
        else if (lang === "ta") { bold = "@BMESS_TA@"; msg = "@MESS_TA@"; }
        else { bold = "@BMESS@"; msg = "@MESS@"; }
        if (!msg || msg.trim() === "") { errorBox.style.display = "none"; return; }
        errorText.innerHTML = (bold ? "<b>" + bold + "</b> " : "") + msg;
        errorBox.style.display = "block";
      }
    </script>

    <script src="js/lang.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
